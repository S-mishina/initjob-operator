    paths-ignore:
      - '*.md'
  pull_request:
    paths-ignore:
      - '*.md'

jobs:
  test:
    permissions:
      contents: read
      pull-requests: write
    uses: S-mishina/reusable-workflows/.github/workflows/go-test.yml@main
