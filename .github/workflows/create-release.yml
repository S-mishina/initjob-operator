name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft'
        required: false
        type: boolean
        default: true

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: S-mishina/reusable-workflows/.github/workflows/release.yml@main
    with:
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      draft: ${{ inputs.draft }}
      environment: release
      pre-release-steps: "make build-installer IMG=ghcr.io/s-mishina/initjob-operator:${{ inputs.version }}"
      release-assets: dist/install.yaml
      install-instructions: "kubectl apply -f https://github.com/S-mishina/initjob-operator/releases/download/${VERSION}/install.yaml"
      docker-build: true
      docker-image-name: s-mishina/initjob-operator
      docker-metadata-tags: |
        type=raw,value=${{ inputs.version }}
        type=sha
        type=raw,value=latest,enable=${{ !inputs.prerelease }}
