name: Create Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for draft releases
        id: draft-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_COUNT=$(gh release list --json isDraft --jq '[.[] | select(.isDraft)] | length')
          if [ "$DRAFT_COUNT" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Draft release exists (${DRAFT_COUNT}), skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine next version
        if: steps.draft-check.outputs.skip != 'true'
        id: version
        run: |
          # Get latest tag
          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          # Parse current version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Analyze commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from commit messages
          if echo "$COMMITS" | grep -qiE "^BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT_TAG}"

      - name: Create tag
        if: steps.draft-check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.draft-check.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
