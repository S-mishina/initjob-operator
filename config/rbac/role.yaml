---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.init.sre.ryu-tech.blog
  resources:
  - initjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.init.sre.ryu-tech.blog
  resources:
  - initjobs/finalizers
  verbs:
  - update
- apiGroups:
  - batch.init.sre.ryu-tech.blog
  resources:
  - initjobs/status
  verbs:
  - get
  - patch
  - update
