# This rule is not used by the project initjob-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the batch.init.sre.ryu-tech.blog.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: initjob-operator
    app.kubernetes.io/managed-by: kustomize
  name: initjob-editor-role
rules:
- apiGroups:
  - batch.init.sre.ryu-tech.blog
  resources:
  - initjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.init.sre.ryu-tech.blog
  resources:
  - initjobs/status
  verbs:
  - get
