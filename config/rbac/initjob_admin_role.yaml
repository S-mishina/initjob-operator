# This rule is not used by the project initjob-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over batch.init.sre.example.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: initjob-operator
    app.kubernetes.io/managed-by: kustomize
  name: initjob-admin-role
rules:
- apiGroups:
  - batch.init.sre.example.com
  resources:
  - initjobs
  verbs:
  - '*'
- apiGroups:
  - batch.init.sre.example.com
  resources:
  - initjobs/status
  verbs:
  - get
